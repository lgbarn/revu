name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the GitHub Release for the tag up front. The per-target upload jobs
  # run in parallel and each tried to create the release, racing and failing
  # with "release not found"; creating it here once (idempotently) gives them a
  # release to attach assets to.
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "revu ${GITHUB_REF_NAME}"
          fi

  upload-binaries:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static Linux binaries (musl), x86_64 + aarch64.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # macOS, Intel + Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Builds `revu` for the target and uploads `revu-<target>.tar.gz` to the
      # GitHub Release created above. Handles cross-compilation (musl, aarch64)
      # and target installation automatically.
      #
      # NOTE: no code signing / notarization is wired up (a deliberate, flagged
      # human decision - see the PR). macOS binaries are unsigned.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: revu
          target: ${{ matrix.target }}
          # Produces an archive named `revu-<target>.tar.gz` with the `revu`
          # binary at its root. Must stay in sync with the binstall pkg-url and
          # the Homebrew formula.
          archive: $bin-$target
          tar: all
          zip: none
          token: ${{ secrets.GITHUB_TOKEN }}

  # Regenerate the Homebrew formula from the in-repo template
  # (packaging/homebrew/revu.rb) with this release's version + the four uploaded
  # tarballs' sha256, and push it to the tap repo so `brew upgrade` just works.
  #
  # Requires a cross-repo token: the default GITHUB_TOKEN can only write to this
  # repo, not the tap. Set a repo secret `HOMEBREW_TAP_TOKEN` to a fine-grained
  # PAT with Contents: read+write on lgbarn/homebrew-tap. If the secret is
  # absent the job no-ops (with a warning) so the rest of the release still
  # succeeds. The tap repo defaults to lgbarn/homebrew-tap; change TAP_REPO
  # below if you renamed it.
  update-tap:
    name: update-homebrew-tap
    needs: upload-binaries
    runs-on: ubuntu-latest
    env:
      TAP_REPO: lgbarn/homebrew-tap
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate formula and push to tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap update. See README 'Maintaining the tap'."
            exit 0
          fi
          ver="${VERSION#v}"  # strip leading 'v' -> bare version for the formula

          # Pull this release's tarballs to checksum them.
          gh release download "${VERSION}" --repo "${GITHUB_REPOSITORY}" --pattern '*.tar.gz' --dir dl
          sha() { sha256sum "dl/revu-$1.tar.gz" | cut -d' ' -f1; }

          # Fill the template: bump the version line and substitute each target's
          # sha256, then drop the leading template-comment block.
          sed \
            -e "s|^  version .*|  version \"${ver}\"|" \
            -e "s|TODO_FILL_SHA256_aarch64-apple-darwin|$(sha aarch64-apple-darwin)|" \
            -e "s|TODO_FILL_SHA256_x86_64-apple-darwin|$(sha x86_64-apple-darwin)|" \
            -e "s|TODO_FILL_SHA256_aarch64-unknown-linux-musl|$(sha aarch64-unknown-linux-musl)|" \
            -e "s|TODO_FILL_SHA256_x86_64-unknown-linux-musl|$(sha x86_64-unknown-linux-musl)|" \
            packaging/homebrew/revu.rb \
            | awk '/^class /{p=1} p' > formula.rb

          # Push it to the tap.
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/revu.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date for ${ver}."
            exit 0
          fi
          git add Formula/revu.rb
          git commit -m "revu ${ver}"
          git push
