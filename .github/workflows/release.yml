name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the GitHub Release for the tag up front. The per-target upload jobs
  # run in parallel and each tried to create the release, racing and failing
  # with "release not found"; creating it here once (idempotently) gives them a
  # release to attach assets to.
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  upload-binaries:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static Linux binaries (musl), x86_64 + aarch64.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          # macOS, Intel + Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Builds `revu` for the target and uploads `revu-<target>.tar.gz` to the
      # GitHub Release created above. Handles cross-compilation (musl, aarch64)
      # and target installation automatically.
      #
      # NOTE: no code signing / notarization is wired up (a deliberate, flagged
      # human decision - see the PR). macOS binaries are unsigned.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: revu
          target: ${{ matrix.target }}
          # Produces an archive named `revu-<target>.tar.gz` with the `revu`
          # binary at its root. Must stay in sync with the binstall pkg-url and
          # the Homebrew formula.
          archive: $bin-$target
          tar: all
          zip: none
          token: ${{ secrets.GITHUB_TOKEN }}
